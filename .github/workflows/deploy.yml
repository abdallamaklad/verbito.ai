name: Deploy Verbito

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-verbito
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Package static build
        run: tar -C dist -czf verbito-dist.tar.gz .

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build and deploy script
        run: |
          scp verbito-dist.tar.gz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/verbito-dist.tar.gz"
          scp scripts/deploy/deploy-vps.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy-verbito.sh"

      - name: Deploy on VPS
        run: ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash /tmp/deploy-verbito.sh /tmp/verbito-dist.tar.gz"

      - name: Smoke test
        run: |
          curl --fail --show-error --silent --head https://verbito.ai
          curl --fail --show-error --silent --head https://verbito.ai/pricing
          asset_path="$(curl --fail --show-error --silent https://verbito.ai | grep -o 'assets/[^"]*\.js' | head -1)"
          test -n "$asset_path"
          curl --fail --show-error --silent --head "https://verbito.ai/$asset_path"
