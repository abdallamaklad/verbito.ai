name: Deploy Verbito

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-verbito
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VPS_HOST: 76.13.190.19
  VPS_USER: root
  SSH_OPTIONS: -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=30 -o ServerAliveCountMax=3

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL || vars.VITE_SITE_URL || 'https://verbito.ai' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://doqpjnbgwycfgawpjomf.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'sb_publishable_5-4ua-16JitaKNARknLJUA_LjFAqy_b' }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || vars.VITE_STRIPE_PUBLISHABLE_KEY || 'pk_live_51TcntE2cUp9MmGxDgFZthJSC5Wqyzzj2mpRMcX4T8Grh63znIM6g9dytHKVoNZzMrzZ3FnCQXh1QPx2blLy0W96f00tNhZCHPF' }}

      - name: Package static build
        run: tar -C dist -czf verbito-dist.tar.gz .

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "Missing GitHub secret: VPS_SSH_KEY" >&2; exit 1)
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          for attempt in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "$VPS_HOST" >> ~/.ssh/known_hosts && break
            echo "ssh-keyscan failed on attempt $attempt" >&2
            sleep $((attempt * 3))
          done
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ssh-keyscan did not return a host key; falling back to SSH accept-new on first connection." >&2
          fi

      - name: Upload build and deploy script
        run: |
          for attempt in 1 2 3 4 5; do
            if scp $SSH_OPTIONS verbito-dist.tar.gz "$VPS_USER@$VPS_HOST:/tmp/verbito-dist.tar.gz" && \
               scp $SSH_OPTIONS scripts/deploy/deploy-vps.sh "$VPS_USER@$VPS_HOST:/tmp/deploy-verbito.sh"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "VPS upload failed after $attempt attempts" >&2
              exit 1
            fi
            echo "VPS upload failed on attempt $attempt; retrying" >&2
            sleep $((attempt * 5))
          done

      - name: Deploy on VPS
        run: |
          for attempt in 1 2 3 4 5; do
            if ssh $SSH_OPTIONS "$VPS_USER@$VPS_HOST" "bash /tmp/deploy-verbito.sh /tmp/verbito-dist.tar.gz"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "VPS deploy failed after $attempt attempts" >&2
              exit 1
            fi
            echo "VPS deploy failed on attempt $attempt; retrying" >&2
            sleep $((attempt * 5))
          done

      - name: Smoke test
        run: |
          curl --fail --show-error --silent --head https://verbito.ai
          curl --fail --show-error --silent --head https://verbito.ai/pricing
          asset_path="$(curl --fail --show-error --silent https://verbito.ai | grep -o 'assets/[^"]*\.js' | head -1)"
          test -n "$asset_path"
          curl --fail --show-error --silent --head "https://verbito.ai/$asset_path"
